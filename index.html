<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC 鬼ごっこシミュレーター</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; }

        #ui { width: 320px; padding: 25px; background: #111; box-sizing: border-box; overflow-y: auto; height: 100vh; border-right: 2px solid #555; }
        #ui::-webkit-scrollbar { width: 8px; }
        #ui::-webkit-scrollbar-track { background: #000; }
        #ui::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        #game-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #000; position: relative; height: 100vh; overflow: hidden; }

        canvas { background: #050505; border: 1px solid #333; max-width: 95%; max-height: 95%; object-fit: contain; }

        input, button { width: 100%; margin-bottom: 12px; padding: 10px; box-sizing: border-box; background: #000; border: 2px solid #fff; color: #fff; font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 5px; transition: all 0.2s ease; text-transform: uppercase; }
        input { cursor: text; border-color: #666; color: #ccc; }
        input:focus { border-color: #0f0; color: #fff; outline: none; }

        button { border-color: #555; }
        button:hover { background: #333; }

        .btn-mission { border-color: #f00; color: #f00; }
        .btn-mission:hover { background: #500; color: #fff; }

        .btn-freeze { border-color: #ff0; color: #ff0; }
        .btn-freeze:hover { background: #550; color: #fff; }

        h3 { margin-top: 0; font-size: 1.4em; color: #fff; border-bottom: 2px solid #555; padding-bottom: 10px; margin-bottom: 20px; }
        label { color: #ccc; font-size: 0.9em; margin-bottom: 5px; display: block; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }

        .status-box { background: #111; padding: 15px; margin-bottom: 20px; border-radius: 5px; font-size: 0.95em; border: 1px solid #555; }
        .status-box div { margin-bottom: 5px; }
        #status-time { color: #fff; font-weight: bold; }
        #status-runners { color: #0f0; font-weight: bold; }
        #status-message { color: #ff0; font-weight: bold; }
        
        .legend { margin-top: 20px; font-size: 0.85em; color: #ccc; line-height: 1.8; }
        .legend span { display: inline-block; width: 12px; height: 12px; margin-right: 8px; border-radius: 2px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="ui">
    <h3>設定パネル</h3>
    <div id="setup-panel">
        <label>逃げの数 (1/4はアホ): <input type="number" id="input-runners" value="40" min="1"></label>
        <label>最初の鬼の数: <input type="number" id="input-hunters" value="3" min="1"></label>
        <label>制限時間 (分): <input type="number" id="input-time" value="10" min="1"></label>
        <button onclick="startGame()" style="border-color:#0f0; color:#0f0;">ゲームスタート</button>
    </div>

    <div id="control-panel" style="display:none;">
        <div class="status-box">
            <div id="status-time">残り時間: --:--</div>
            <div id="status-runners">生存者: 0</div>
            <div id="status-message"></div>
        </div>
        
        <label>追加する鬼の数: <input type="number" id="input-add-hunters" value="5" min="1"></label>
        <button onclick="addHuntersBtn()">鬼を追加</button>
        
        <hr>
        <button class="btn-mission" onclick="triggerMission()">ミッション発動</button>
        <button class="btn-freeze" onclick="triggerFreezeGun()">冷凍銃を配置</button>
        
        <hr>
        <button onclick="resetGame()">リセットして戻る</button>
    </div>

    <div class="legend">
        <span style="background:#0f0;"></span>緑: 逃げ（通常＆アホ）<br>
        <span style="background:#f00;"></span>赤: 鬼（追加・ミッション含む）<br>
        <span style="background:#0cf;"></span>水色: 冷凍された鬼<br>
        <span style="background:#ff0;"></span>黄色: 冷凍銃(四角) / アイテム(丸)<br>
        <span style="border:2px solid #0f0; background:none; box-sizing:border-box;"></span>緑枠/赤枠: 安全エリア
    </div>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
// --- シミュレーション定数 ---
const MAP_SIZE = 1000; 
const RUNNER_SPEED = 1.2;
const HUNTER_SPEED = 1.4; 
const SIGHT_RANGE = 200;
const SIGHT_RANGE_SQ = SIGHT_RANGE * SIGHT_RANGE; // 高速計算用
const ENTITY_RADIUS = 6;
const ITEM_RADIUS = 9;

// --- 状態管理 ---
let state = null;
let lastTimestamp = 0;
let animationId = null;
const canvas = document.getElementById('gameCanvas');
canvas.width = MAP_SIZE;
canvas.height = MAP_SIZE;
const ctx = canvas.getContext('2d');

// --- ユーティリティ ---
const rand = (min, max) => Math.random() * (max - min) + min;
// 距離の2乗を返す（平方根計算を省き、重くならないようにする）
const distSq = (p1, p2) => (p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2;
const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

// --- 初期化ロジック ---
function initGameState(numRunners, numHunters, timeLimitMinutes) {
    let boxW = 150, boxH = 150;
    let box = {
        x: rand(100, MAP_SIZE - boxW - 100),
        y: rand(100, MAP_SIZE - boxH - 100),
        w: boxW, h: boxH,
        active: true,
        timer: 30
    };

    let runners = [];
    let numFools = Math.floor(numRunners / 4); 
    for(let i=0; i<numRunners; i++){
        runners.push({
            id: i,
            x: rand(ENTITY_RADIUS, MAP_SIZE - ENTITY_RADIUS),
            y: rand(ENTITY_RADIUS, MAP_SIZE - ENTITY_RADIUS),
            tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE),
            hasItem: false,
            inSafeZone: false,
            dead: false,
            isFool: (i < numFools) 
        });
    }

    let hunters = [];
    for(let i=0; i<numHunters; i++){
        hunters.push({
            id: i,
            x: box.x + rand(20, box.w - 20),
            y: box.y + rand(20, box.h - 20),
            tx: box.x + box.w/2, ty: box.y + box.h/2,
            frozen: false,
            isMission: false
        });
    }

    let safeR = 200;
    state = {
        isRunning: true,
        gameResult: null,
        totalTime: timeLimitMinutes * 60,
        timeLeft: timeLimitMinutes * 60,
        box: box,
        runners: runners,
        hunters: hunters,
        items: [],
        freezeGuns: [],
        mission: {
            active: false,
            phase: 0,
            timer: 0,
            safeZone: { x: MAP_SIZE/2, y: MAP_SIZE/2, r: safeR }
        },
        lastUpdate: Date.now()
    };
}

// --- UI アクション ---
function startGame() {
    const rInput = document.getElementById('input-runners');
    const hInput = document.getElementById('input-hunters');
    const tInput = document.getElementById('input-time');
    
    let r = parseInt(rInput.value) || 40;
    let h = parseInt(hInput.value) || 3;
    let t = parseInt(tInput.value) || 10;
    
    initGameState(r, h, t);
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('control-panel').style.display = 'block';
    
    if (animationId) cancelAnimationFrame(animationId);
    requestAnimationFrame(update);
}

function resetGame() {
    state = null;
    if (animationId) cancelAnimationFrame(animationId);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('setup-panel').style.display = 'block';
    document.getElementById('control-panel').style.display = 'none';
    document.getElementById('status-message').innerText = "";
}

function addHuntersBtn() {
    if (!state || !state.isRunning) return;
    let count = parseInt(document.getElementById('input-add-hunters').value) || 5;
    for(let i=0; i<count; i++){
        state.hunters.push({
            id: Date.now() + i,
            x: rand(0, MAP_SIZE), y: rand(0, MAP_SIZE),
            tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE),
            frozen: false, isMission: false
        });
    }
    showMessage(`鬼を ${count} 体追加しました！`);
}

function triggerMission() {
    if (!state || !state.isRunning || state.mission.active) return;
    state.mission.active = true;
    state.mission.phase = 1;
    state.mission.timer = 30; // 30秒カウントダウン
    
    let aliveRunners = state.runners.filter(r => !r.dead);
    // 今生存している逃げの数だけアイテムを設置
    aliveRunners.forEach((r, idx) => {
        state.items.push({
            id: idx,
            x: rand(50, MAP_SIZE - 50),
            y: rand(50, MAP_SIZE - 50)
        });
    });
    showMessage("ミッション発動！アイテムを拾って安全エリアへ急げ！(30秒)");
}

function triggerFreezeGun() {
    if (!state || !state.isRunning) return;
    for(let i=0; i<10; i++){
        state.hunters.push({
            id: Date.now() + i,
            x: rand(0, MAP_SIZE), y: rand(0, MAP_SIZE),
            tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE),
            frozen: false, isMission: false
        });
    }
    state.freezeGuns.push({
        x: rand(50, MAP_SIZE - 50),
        y: rand(50, MAP_SIZE - 50)
    });
    showMessage("冷凍銃が出現！同時に鬼が10体追加されました！");
}

function showMessage(msg) {
    let el = document.getElementById('status-message');
    el.innerText = msg;
    setTimeout(() => { if(el.innerText === msg) el.innerText = ""; }, 5000);
}

// --- メインループとロジック ---
function update() {
    if (!state) return;
    let now = Date.now();
    let dt = (now - state.lastUpdate) / 1000;
    state.lastUpdate = now;

    if (state.isRunning) {
        state.timeLeft -= dt;
        
        if (state.box.active) {
            state.box.timer -= dt;
            if (state.box.timer <= 0) {
                state.box.active = false;
                showMessage("鬼がBOXから放出されました！");
            }
        }

        if (state.mission.active) {
            state.mission.timer -= dt;
            if (state.mission.phase === 1 && state.mission.timer <= 0) {
                // 発動から30秒後、フェーズ2（100体放出・分断）へ移行
                state.mission.phase = 2;
                state.mission.timer = 300; // 5分間
                for(let i=0; i<100; i++) {
                    let angle = rand(0, Math.PI * 2);
                    let distance = rand(state.mission.safeZone.r + 50, MAP_SIZE/2);
                    state.hunters.push({
                        id: 'm_' + Date.now() + i,
                        x: state.mission.safeZone.x + Math.cos(angle) * distance,
                        y: state.mission.safeZone.y + Math.sin(angle) * distance,
                        tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE),
                        frozen: false, isMission: true
                    });
                }
                showMessage("エリア分断！鬼100体放出！外に取り残された者は5分間耐えろ！");
            } else if (state.mission.phase === 2 && state.mission.timer <= 0) {
                state.mission.active = false;
                state.mission.phase = 0;
                state.hunters = state.hunters.filter(h => !h.isMission);
                state.runners.forEach(r => { r.hasItem = false; r.inSafeZone = false; });
                state.items = [];
                showMessage("ミッション終了！鬼100体が消滅し、安全エリアが解除されました。");
            }
        }

        let aliveCount = state.runners.filter(r => !r.dead).length;
        if (aliveCount === 0) {
            state.isRunning = false;
            state.gameResult = "鬼の勝利（全員確保）";
        } else if (state.timeLeft <= 0) {
            state.isRunning = false;
            state.gameResult = "逃げの勝利（時間切れ）";
        }

        updateEntities(dt);
    }

    draw();
    updateUI();
    animationId = requestAnimationFrame(update);
}

function updateEntities(dt) {
    let aliveRunners = state.runners.filter(r => !r.dead);
    const itemRadSq = (ITEM_RADIUS + ENTITY_RADIUS) ** 2;

    // 逃げの処理
    aliveRunners.forEach(r => {
        if (state.mission.phase === 2) {
            let dSqCenter = distSq(r, state.mission.safeZone);
            let safeRSq = state.mission.safeZone.r ** 2;
            
            // 境界壁の押し戻し (厳密な計算でなくても簡易計算で重さ軽減)
            if (r.inSafeZone && dSqCenter > (state.mission.safeZone.r - ENTITY_RADIUS)**2) {
                let angle = Math.atan2(r.y - state.mission.safeZone.y, r.x - state.mission.safeZone.x);
                r.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
                r.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
            } else if (!r.inSafeZone && dSqCenter < (state.mission.safeZone.r + ENTITY_RADIUS)**2) {
                let angle = Math.atan2(r.y - state.mission.safeZone.y, r.x - state.mission.safeZone.x);
                r.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
                r.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
            }
        }

        // 冷凍銃の取得 (アホは取らない)
        if (!r.isFool) {
            for (let i = state.freezeGuns.length - 1; i >= 0; i--) {
                if (distSq(r, state.freezeGuns[i]) < itemRadSq) {
                    state.freezeGuns.splice(i, 1);
                    let closeHunters = [...state.hunters].filter(h=>!h.frozen).sort((a,b) => distSq(r, a) - distSq(r, b));
                    for(let j=0; j<Math.min(closeHunters.length, 10); j++) {
                        closeHunters[j].frozen = true;
                    }
                    showMessage("逃げが冷凍銃を使用！鬼を冷凍しました！");
                }
            }
        }

        // ミッションアイテムの取得 (アホは取らない)
        if (state.mission.phase === 1 && !r.hasItem && !r.isFool) {
            for (let i = state.items.length - 1; i >= 0; i--) {
                if (distSq(r, state.items[i]) < itemRadSq) {
                    r.hasItem = true;
                    state.items.splice(i, 1);
                    break;
                }
            }
        }

        let speed = RUNNER_SPEED;
        let targetX = r.tx, targetY = r.ty;
        let nearestHunter = null;
        let minDistSq = SIGHT_RANGE_SQ;
        
        state.hunters.forEach(h => {
            if (h.frozen) return;
            if (r.inSafeZone && state.mission.phase > 0) return;
            if (state.mission.phase === 2) {
                let hInSafe = distSq(h, state.mission.safeZone) < (state.mission.safeZone.r ** 2);
                if (r.inSafeZone !== hInSafe) return;
            }
            let dSq = distSq(r, h);
            if (dSq < minDistSq) { minDistSq = dSq; nearestHunter = h; }
        });

        if (nearestHunter) {
            let angle = Math.atan2(r.y - nearestHunter.y, r.x - nearestHunter.x);
            targetX = r.x + Math.cos(angle) * 100;
            targetY = r.y + Math.sin(angle) * 100;
        } else if (state.mission.phase === 1 && !r.isFool) {
            if (!r.hasItem && state.items.length > 0) {
                let nearestItem = state.items.reduce((prev, curr) => distSq(r, curr) < distSq(r, prev) ? curr : prev);
                targetX = nearestItem.x; targetY = nearestItem.y;
            } else if (r.hasItem) {
                targetX = state.mission.safeZone.x;
                targetY = state.mission.safeZone.y;
                if (distSq(r, state.mission.safeZone) < state.mission.safeZone.r ** 2) {
                    r.inSafeZone = true;
                }
            }
        } else {
            if (distSq(r, {x: r.tx, y: r.ty}) < 100 || Math.random() < 0.01) {
                r.tx = rand(0, MAP_SIZE); r.ty = rand(0, MAP_SIZE);
            }
        }
        moveEntity(r, targetX, targetY, speed);
    });

    const catchRadSq = (ENTITY_RADIUS * 2) ** 2;

    // 鬼の処理
    state.hunters.forEach(h => {
        if (h.frozen) return;

        if (state.box.active) {
            if (h.x > state.box.x && h.x < state.box.x + state.box.w && h.y > state.box.y && h.y < state.box.y + state.box.h) {
                if (distSq(h, {x:h.tx, y:h.ty}) < 100 || Math.random() < 0.05) {
                    h.tx = state.box.x + rand(10, state.box.w-10);
                    h.ty = state.box.y + rand(10, state.box.h-10);
                }
                moveEntity(h, h.tx, h.ty, HUNTER_SPEED);
                return;
            }
        }

        if (state.mission.phase === 2) {
            let dSqCenter = distSq(h, state.mission.safeZone);
            let inSafe = dSqCenter < (state.mission.safeZone.r ** 2);
            if (!inSafe && dSqCenter < (state.mission.safeZone.r + ENTITY_RADIUS)**2) {
                let angle = Math.atan2(h.y - state.mission.safeZone.y, h.x - state.mission.safeZone.x);
                h.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
                h.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
            } else if (inSafe && dSqCenter > (state.mission.safeZone.r - ENTITY_RADIUS)**2) {
                 let angle = Math.atan2(h.y - state.mission.safeZone.y, h.x - state.mission.safeZone.x);
                h.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
                h.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
            }
        }

        let nearestRunner = null;
        let minDistSq = SIGHT_RANGE_SQ;
        
        aliveRunners.forEach(r => {
            if (r.inSafeZone && state.mission.phase > 0) return;
            if (state.mission.phase === 2) {
                let hInSafe = distSq(h, state.mission.safeZone) < (state.mission.safeZone.r ** 2);
                let rInSafe = distSq(r, state.mission.safeZone) < (state.mission.safeZone.r ** 2);
                if (hInSafe !== rInSafe) return;
            }
            let dSq = distSq(h, r);
            if (dSq < minDistSq) { minDistSq = dSq; nearestRunner = r; }
            if (dSq < catchRadSq) { r.dead = true; } // 確保
        });

        if (nearestRunner) {
            h.tx = nearestRunner.x; h.ty = nearestRunner.y;
        } else {
            if (distSq(h, {x: h.tx, y: h.ty}) < 100 || Math.random() < 0.01) {
                h.tx = rand(0, MAP_SIZE); h.ty = rand(0, MAP_SIZE);
            }
        }
        moveEntity(h, h.tx, h.ty, HUNTER_SPEED);
    });
}

function moveEntity(e, tx, ty, speed) {
    let angle = Math.atan2(ty - e.y, tx - e.x);
    let nx = e.x + Math.cos(angle) * speed;
    let ny = e.y + Math.sin(angle) * speed;

    if (nx < ENTITY_RADIUS) nx = ENTITY_RADIUS;
    if (nx > MAP_SIZE - ENTITY_RADIUS) nx = MAP_SIZE - ENTITY_RADIUS;
    if (ny < ENTITY_RADIUS) ny = ENTITY_RADIUS;
    if (ny > MAP_SIZE - ENTITY_RADIUS) ny = MAP_SIZE - ENTITY_RADIUS;

    e.x = nx; e.y = ny;
}

// --- 描画処理 (バッチ描画で軽量化) ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!state) return;

    ctx.lineWidth = 1;

    // グリッド
    ctx.strokeStyle = '#222';
    ctx.beginPath();
    for(let i=0; i<MAP_SIZE; i+=100) {
        ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE);
        ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i);
    }
    ctx.stroke();

    // 安全エリア
    if (state.mission.active) {
        ctx.beginPath();
        ctx.arc(state.mission.safeZone.x, state.mission.safeZone.y, state.mission.safeZone.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0, 255, 0, 0.05)';
        ctx.fill();
        ctx.strokeStyle = state.mission.phase === 2 ? '#f00' : '#0f0';
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    // 鬼BOX
    if (state.box.active) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.strokeRect(state.box.x, state.box.y, state.box.w, state.box.h);
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(state.box.x, state.box.y, state.box.w, state.box.h);
        ctx.fillStyle = '#fff';
        ctx.font = '24px sans-serif';
        ctx.fillText(Math.ceil(state.box.timer), state.box.x + state.box.w/2 - 12, state.box.y + state.box.h/2 + 8);
    }

    // アイテム (黄色い丸)
    if (state.items.length > 0) {
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        state.items.forEach(item => {
            ctx.moveTo(item.x + ITEM_RADIUS, item.y);
            ctx.arc(item.x, item.y, ITEM_RADIUS, 0, Math.PI*2);
        });
        ctx.fill();
    }

    // 冷凍銃 (黄色い四角)
    if (state.freezeGuns.length > 0) {
        ctx.fillStyle = '#ff0';
        state.freezeGuns.forEach(gun => {
            ctx.fillRect(gun.x - 8, gun.y - 8, 16, 16);
        });
    }

    // 逃げの描画 (緑色で一括描画)
    ctx.fillStyle = '#0f0';
    ctx.beginPath();
    state.runners.forEach(r => {
        if (r.dead) return;
        ctx.moveTo(r.x + ENTITY_RADIUS, r.y);
        ctx.arc(r.x, r.y, ENTITY_RADIUS, 0, Math.PI*2);
    });
    ctx.fill();

    // アイテムを持っている逃げのマーカー (黒い点)
    ctx.fillStyle = '#000';
    ctx.beginPath();
    state.runners.forEach(r => {
        if (r.dead || !r.hasItem) return;
        ctx.moveTo(r.x + 3, r.y);
        ctx.arc(r.x, r.y, 3, 0, Math.PI*2);
    });
    ctx.fill();

    // 鬼の描画 (赤色で一括描画)
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    state.hunters.forEach(h => {
        if (h.frozen) return;
        ctx.moveTo(h.x + ENTITY_RADIUS, h.y);
        ctx.arc(h.x, h.y, ENTITY_RADIUS, 0, Math.PI*2);
    });
    ctx.fill();

    // 冷凍された鬼 (水色で一括描画)
    ctx.fillStyle = '#0cf';
    ctx.beginPath();
    state.hunters.forEach(h => {
        if (!h.frozen) return;
        ctx.moveTo(h.x + ENTITY_RADIUS, h.y);
        ctx.arc(h.x, h.y, ENTITY_RADIUS, 0, Math.PI*2);
    });
    ctx.fill();
}

// --- UI更新 ---
function updateUI() {
    if (!state) return;
    
    let timeEl = document.getElementById('status-time');
    if (state.isRunning) {
        let m = Math.floor(state.timeLeft / 60);
        let s = Math.floor(state.timeLeft % 60);
        let timeStr = `${m}:${s.toString().padStart(2, '0')}`;
        
        if (state.mission.active) {
            timeStr += ` [ミッション: ${Math.ceil(state.mission.timer)}秒]`;
        }
        timeEl.innerText = `残り時間: ${timeStr}`;
    } else {
        timeEl.innerText = `終了: ${state.gameResult}`;
    }

    let alive = state.runners.filter(r => !r.dead).length;
    document.getElementById('status-runners').innerText = `生存者: ${alive} / ${state.runners.length}`;
}

// 初期状態は描画のみ行う
draw();
</script>
