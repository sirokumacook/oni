<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC鬼ごっこシミュレーション</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: #fff; font-family: sans-serif; display: flex; }
        #ui { width: 300px; padding: 20px; background: #333; box-sizing: border-box; overflow-y: auto; height: 100vh; }
        #game-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; position: relative; }
        canvas { background: #eee; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; object-fit: contain; }
        input, button { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        .btn-mission { background: #f44336; }
        .btn-mission:hover { background: #da190b; }
        .btn-freeze { background: #2196F3; }
        .btn-freeze:hover { background: #0b7dda; }
        h3 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .status-box { background: #444; padding: 10px; margin-bottom: 15px; border-radius: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="ui">
    <h3>設定 & 操作</h3>
    <div id="setup-panel">
        <label>逃げの数: <input type="number" id="input-runners" value="50" min="1"></label>
        <label>最初の鬼の数: <input type="number" id="input-hunters" value="3" min="1"></label>
        <label>制限時間(分): <input type="number" id="input-time" value="10" min="1"></label>
        <button onclick="startGame()">ゲームスタート</button>
        <button onclick="resetGame()" style="background:#777;">リセット</button>
    </div>

    <div id="control-panel" style="display:none; margin-top: 20px;">
        <div class="status-box">
            <div id="status-time">残り時間: --:--</div>
            <div id="status-runners">生存者: 0</div>
            <div id="status-message" style="color:#ffeb3b; margin-top:5px; font-weight:bold;"></div>
        </div>
        
        <label>追加する鬼の数: <input type="number" id="input-add-hunters" value="5" min="1"></label>
        <button onclick="addHuntersBtn()">鬼追加</button>
        
        <hr style="border-color:#555; my:15px;">
        <button class="btn-mission" onclick="triggerMission()">MISSION 発動</button>
        <button class="btn-freeze" onclick="triggerFreezeGun()">冷凍銃 発動</button>
    </div>

    <div style="margin-top: 20px; font-size: 0.8em; color: #aaa;">
        青: 逃げ / 赤: 鬼<br>
        灰: 障害物 / 黒枠: 鬼BOX<br>
        緑枠: 安全エリア / 黄: ミッションアイテム<br>
        水色: 冷凍銃<br>
        ※サイトを閉じても時間は経過します
    </div>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="2000" height="2000"></canvas>
</div>

<script>
// --- シミュレーション定数 ---
const MAP_SIZE = 2000;
const RUNNER_SPEED = 2;
const HUNTER_SPEED = 2.2; // 鬼の方が少し速い
const SIGHT_RANGE = 300;
const OBSTACLE_COUNT = 30;
const ENTITY_RADIUS = 8;
const ITEM_RADIUS = 12;

// --- 状態管理 ---
let state = null;
let lastTimestamp = 0;
let animationId = null;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- ユーティリティ ---
const rand = (min, max) => Math.random() * (max - min) + min;
const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

// --- 初期化ロジック ---
function createObstacles() {
    let obs = [];
    let cols = Math.ceil(Math.sqrt(OBSTACLE_COUNT));
    let rows = Math.ceil(OBSTACLE_COUNT / cols);
    let cellW = MAP_SIZE / cols;
    let cellH = MAP_SIZE / rows;
    for (let i = 0; i < OBSTACLE_COUNT; i++) {
        let c = i % cols;
        let r = Math.floor(i / cols);
        obs.push({
            x: c * cellW + rand(50, cellW - 150),
            y: r * cellH + rand(50, cellH - 150),
            w: rand(100, 250),
            h: rand(100, 250)
        });
    }
    return obs;
}

function initGameState(numRunners, numHunters, timeLimitMinutes) {
    let obstacles = createObstacles();
    
    let box = {
        x: rand(200, MAP_SIZE - 400),
        y: rand(200, MAP_SIZE - 400),
        w: 200, h: 200,
        active: true,
        timer: 30
    };

    let runners = [];
    for(let i=0; i<numRunners; i++){
        runners.push({
            id: i,
            x: rand(ENTITY_RADIUS, MAP_SIZE - ENTITY_RADIUS),
            y: rand(ENTITY_RADIUS, MAP_SIZE - ENTITY_RADIUS),
            tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE), // 目標地点
            hasItem: false,
            inSafeZone: false,
            dead: false
        });
    }

    let hunters = [];
    for(let i=0; i<numHunters; i++){
        hunters.push({
            id: i,
            x: box.x + rand(20, box.w - 20),
            y: box.y + rand(20, box.h - 20),
            tx: box.x + box.w/2, ty: box.y + box.h/2,
            frozen: false,
            isMission: false
        });
    }

    state = {
        isRunning: true,
        gameResult: null,
        totalTime: timeLimitMinutes * 60,
        timeLeft: timeLimitMinutes * 60,
        obstacles: obstacles,
        box: box,
        runners: runners,
        hunters: hunters,
        items: [], // ミッションアイテム
        freezeGuns: [],
        mission: {
            active: false,
            phase: 0, // 0:なし, 1:アイテム回収(30s), 2:分断サバイバル(300s)
            timer: 0,
            safeZone: { x: MAP_SIZE/2, y: MAP_SIZE/2, r: 300 }
        },
        lastUpdate: Date.now()
    };
    saveState();
}

// --- 永続化 (localStorage) ---
function saveState() {
    if (state) localStorage.setItem('onigokko_state', JSON.stringify(state));
}

function loadState() {
    let saved = localStorage.getItem('onigokko_state');
    if (saved) {
        state = JSON.parse(saved);
        // オフライン中の経過時間を反映
        let now = Date.now();
        let diffSeconds = (now - state.lastUpdate) / 1000;
        state.lastUpdate = now;

        if (state.isRunning) {
            state.timeLeft -= diffSeconds;
            if (state.box.active) state.box.timer -= diffSeconds;
            if (state.mission.active) state.mission.timer -= diffSeconds;
            
            checkTimeTriggers(); // 時間経過によるイベントのチェック
        }
        return true;
    }
    return false;
}

function clearState() {
    localStorage.removeItem('onigokko_state');
    state = null;
}

// --- UI アクション ---
function startGame() {
    let r = parseInt(document.getElementById('input-runners').value);
    let h = parseInt(document.getElementById('input-hunters').value);
    let t = parseInt(document.getElementById('input-time').value);
    initGameState(r, h, t);
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('control-panel').style.display = 'block';
}

function resetGame() {
    clearState();
    location.reload();
}

function addHuntersBtn() {
    if (!state || !state.isRunning) return;
    let count = parseInt(document.getElementById('input-add-hunters').value);
    for(let i=0; i<count; i++){
        state.hunters.push({
            id: Date.now() + i,
            x: rand(0, MAP_SIZE), y: rand(0, MAP_SIZE),
            tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE),
            frozen: false, isMission: false
        });
    }
    saveState();
}

function triggerMission() {
    if (!state || !state.isRunning || state.mission.active) return;
    state.mission.active = true;
    state.mission.phase = 1;
    state.mission.timer = 30;
    
    // 生存人数分のアイテムを生成
    let aliveRunners = state.runners.filter(r => !r.dead);
    aliveRunners.forEach((r, idx) => {
        state.items.push({
            id: idx,
            x: rand(50, MAP_SIZE - 50),
            y: rand(50, MAP_SIZE - 50)
        });
    });
    showMessage("MISSION: アイテムを拾って安全エリアへ！(30秒)");
    saveState();
}

function triggerFreezeGun() {
    if (!state || !state.isRunning) return;
    // 鬼を10体放出
    for(let i=0; i<10; i++){
        state.hunters.push({
            id: Date.now() + i,
            x: rand(0, MAP_SIZE), y: rand(0, MAP_SIZE),
            tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE),
            frozen: false, isMission: false
        });
    }
    // 冷凍銃出現
    state.freezeGuns.push({
        x: rand(50, MAP_SIZE - 50),
        y: rand(50, MAP_SIZE - 50)
    });
    showMessage("冷凍銃が出現！鬼が10体追加されました。");
    saveState();
}

function showMessage(msg) {
    let el = document.getElementById('status-message');
    el.innerText = msg;
    setTimeout(() => { if(el.innerText === msg) el.innerText = ""; }, 5000);
}

// --- メインループとロジック ---
function update() {
    if (!state) return;
    let now = Date.now();
    let dt = (now - state.lastUpdate) / 1000;
    state.lastUpdate = now;

    if (state.isRunning) {
        // タイマー更新
        state.timeLeft -= dt;
        if (state.box.active) {
            state.box.timer -= dt;
            if (state.box.timer <= 0) {
                state.box.active = false;
                showMessage("鬼がBOXから放出されました！");
            }
        }

        // ミッションタイマー更新
        if (state.mission.active) {
            state.mission.timer -= dt;
            if (state.mission.phase === 1 && state.mission.timer <= 0) {
                // フェーズ2へ（100体追加、分断、5分間）
                state.mission.phase = 2;
                state.mission.timer = 300; // 5分
                for(let i=0; i<100; i++) {
                    // 安全エリア外に配置
                    let angle = rand(0, Math.PI * 2);
                    let distance = rand(state.mission.safeZone.r + 50, MAP_SIZE);
                    state.hunters.push({
                        id: 'm_' + Date.now() + i,
                        x: state.mission.safeZone.x + Math.cos(angle) * distance,
                        y: state.mission.safeZone.y + Math.sin(angle) * distance,
                        tx: rand(0, MAP_SIZE), ty: rand(0, MAP_SIZE),
                        frozen: false, isMission: true
                    });
                }
                showMessage("ミッション失敗者発生！安全エリア分断、鬼100体放出！(5分耐えろ)");
            } else if (state.mission.phase === 2 && state.mission.timer <= 0) {
                // フェーズ2終了（ミッションクリア、元に戻る）
                state.mission.active = false;
                state.mission.phase = 0;
                // ミッション鬼を消去
                state.hunters = state.hunters.filter(h => !h.isMission);
                // 逃げの無敵・アイテム状態をリセット
                state.runners.forEach(r => { r.hasItem = false; r.inSafeZone = false; });
                state.items = [];
                showMessage("ミッション終了！鬼100体が消滅し、安全エリアが解除されました。");
            }
        }

        // 勝敗判定
        let aliveCount = state.runners.filter(r => !r.dead).length;
        if (aliveCount === 0) {
            state.isRunning = false;
            state.gameResult = "鬼の勝ち（全員確保）";
        } else if (state.timeLeft <= 0) {
            state.isRunning = false;
            state.gameResult = "逃げの勝ち（時間切れ・逃げ切り）";
        }

        updateEntities(dt);
        saveState();
    }

    draw();
    updateUI();
    requestAnimationFrame(update);
}

function checkTimeTriggers() {
    // オフライン中にタイマーが過ぎていた場合の処理を大まかに補正
    if (state.box.active && state.box.timer <= 0) state.box.active = false;
    if (state.timeLeft <= 0) state.isRunning = false;
}

// 衝突判定（円と矩形）
function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
    let testX = cx; let testY = cy;
    if (cx < rx) testX = rx; else if (cx > rx + rw) testX = rx + rw;
    if (cy < ry) testY = ry; else if (cy > ry + rh) testY = ry + rh;
    return dist({x: cx, y: cy}, {x: testX, y: testY}) <= r;
}

function updateEntities(dt) {
    let aliveRunners = state.runners.filter(r => !r.dead);

    // 逃げの処理
    aliveRunners.forEach(r => {
        // 安全エリア内にいる場合の処理 (フェーズ2中は外に出られない、捕まらない)
        if (state.mission.phase === 2) {
            let dToCenter = dist(r, state.mission.safeZone);
            if (r.inSafeZone && dToCenter > state.mission.safeZone.r - ENTITY_RADIUS) {
                // 壁に弾かれる
                let angle = Math.atan2(r.y - state.mission.safeZone.y, r.x - state.mission.safeZone.x);
                r.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
                r.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
            } else if (!r.inSafeZone && dToCenter < state.mission.safeZone.r + ENTITY_RADIUS) {
                // 外からは入れない
                let angle = Math.atan2(r.y - state.mission.safeZone.y, r.x - state.mission.safeZone.x);
                r.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
                r.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
            }
        }

        // 冷凍銃の取得
        for (let i = state.freezeGuns.length - 1; i >= 0; i--) {
            if (dist(r, state.freezeGuns[i]) < ITEM_RADIUS + ENTITY_RADIUS) {
                state.freezeGuns.splice(i, 1);
                // 近くの鬼を最大10体冷凍
                let closeHunters = [...state.hunters].sort((a,b) => dist(r, a) - dist(r, b));
                let frozenCount = 0;
                for (let h of closeHunters) {
                    if (!h.frozen) {
                        h.frozen = true;
                        frozenCount++;
                        if (frozenCount >= 10) break;
                    }
                }
                showMessage("逃げが冷凍銃を使用！鬼を冷凍しました！");
            }
        }

        // ミッションアイテムの取得
        if (state.mission.phase === 1 && !r.hasItem) {
            for (let i = state.items.length - 1; i >= 0; i--) {
                if (dist(r, state.items[i]) < ITEM_RADIUS + ENTITY_RADIUS) {
                    r.hasItem = true;
                    state.items.splice(i, 1);
                    break;
                }
            }
        }

        // AIロジック
        let speed = RUNNER_SPEED;
        let targetX = r.tx, targetY = r.ty;

        // 鬼から逃げる
        let nearestHunter = null;
        let minDist = SIGHT_RANGE;
        state.hunters.forEach(h => {
            if (h.frozen) return;
            // 安全エリア内の逃げは無視される
            if (r.inSafeZone && state.mission.phase > 0) return;
            // 分断中の壁越しは無視
            if (state.mission.phase === 2) {
                let hInSafe = dist(h, state.mission.safeZone) < state.mission.safeZone.r;
                if (r.inSafeZone !== hInSafe) return;
            }

            let d = dist(r, h);
            if (d < minDist) { minDist = d; nearestHunter = h; }
        });

        if (nearestHunter) {
            // 逆方向へ
            let angle = Math.atan2(r.y - nearestHunter.y, r.x - nearestHunter.x);
            targetX = r.x + Math.cos(angle) * 100;
            targetY = r.y + Math.sin(angle) * 100;
        } else if (state.mission.phase === 1) {
            if (!r.hasItem && state.items.length > 0) {
                // アイテムへ
                let nearestItem = state.items.sort((a,b) => dist(r, a) - dist(r, b))[0];
                targetX = nearestItem.x; targetY = nearestItem.y;
            } else if (r.hasItem) {
                // 安全エリアへ
                targetX = state.mission.safeZone.x;
                targetY = state.mission.safeZone.y;
                if (dist(r, state.mission.safeZone) < state.mission.safeZone.r) {
                    r.inSafeZone = true;
                }
            }
        } else {
            // ランダムウォーク
            if (dist(r, {x: r.tx, y: r.ty}) < 10 || Math.random() < 0.01) {
                r.tx = rand(0, MAP_SIZE); r.ty = rand(0, MAP_SIZE);
            }
        }

        moveEntity(r, targetX, targetY, speed);
    });

    // 鬼の処理
    state.hunters.forEach(h => {
        if (h.frozen) return;

        // 鬼BOX内にいる場合の制限
        if (state.box.active) {
            let inBoxX = h.x > state.box.x && h.x < state.box.x + state.box.w;
            let inBoxY = h.y > state.box.y && h.y < state.box.y + state.box.h;
            if (inBoxX && inBoxY) {
                if (dist(h, {x:h.tx, y:h.ty}) < 10 || Math.random() < 0.05) {
                    h.tx = state.box.x + rand(10, state.box.w-10);
                    h.ty = state.box.y + rand(10, state.box.h-10);
                }
                moveEntity(h, h.tx, h.ty, HUNTER_SPEED);
                return; // BOXからは出られない
            }
        }

        // 分断中の安全エリア境界 (鬼は入れない/出られない)
        if (state.mission.phase === 2) {
            let dToCenter = dist(h, state.mission.safeZone);
            let inSafe = dToCenter < state.mission.safeZone.r;
            if (!inSafe && dToCenter < state.mission.safeZone.r + ENTITY_RADIUS) {
                let angle = Math.atan2(h.y - state.mission.safeZone.y, h.x - state.mission.safeZone.x);
                h.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
                h.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r + ENTITY_RADIUS);
            } else if (inSafe && dToCenter > state.mission.safeZone.r - ENTITY_RADIUS) {
                 let angle = Math.atan2(h.y - state.mission.safeZone.y, h.x - state.mission.safeZone.x);
                h.x = state.mission.safeZone.x + Math.cos(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
                h.y = state.mission.safeZone.y + Math.sin(angle) * (state.mission.safeZone.r - ENTITY_RADIUS);
            }
        }

        let nearestRunner = null;
        let minDist = SIGHT_RANGE;

        aliveRunners.forEach(r => {
            if (r.inSafeZone && state.mission.phase > 0) return; // 安全エリアの逃げは追わない
            if (state.mission.phase === 2) {
                let hInSafe = dist(h, state.mission.safeZone) < state.mission.safeZone.r;
                let rInSafe = dist(r, state.mission.safeZone) < state.mission.safeZone.r;
                if (hInSafe !== rInSafe) return; // 分断中
            }

            let d = dist(h, r);
            if (d < minDist) { minDist = d; nearestRunner = r; }
            
            // 捕獲判定
            if (d < ENTITY_RADIUS * 2) {
                r.dead = true;
            }
        });

        if (nearestRunner) {
            h.tx = nearestRunner.x; h.ty = nearestRunner.y;
        } else {
            if (dist(h, {x: h.tx, y: h.ty}) < 10 || Math.random() < 0.01) {
                h.tx = rand(0, MAP_SIZE); h.ty = rand(0, MAP_SIZE);
            }
        }

        moveEntity(h, h.tx, h.ty, HUNTER_SPEED);
    });
}

function moveEntity(e, tx, ty, speed) {
    let angle = Math.atan2(ty - e.y, tx - e.x);
    let nx = e.x + Math.cos(angle) * speed;
    let ny = e.y + Math.sin(angle) * speed;

    // マップ境界
    if (nx < ENTITY_RADIUS) nx = ENTITY_RADIUS;
    if (nx > MAP_SIZE - ENTITY_RADIUS) nx = MAP_SIZE - ENTITY_RADIUS;
    if (ny < ENTITY_RADIUS) ny = ENTITY_RADIUS;
    if (ny > MAP_SIZE - ENTITY_RADIUS) ny = MAP_SIZE - ENTITY_RADIUS;

    // 障害物衝突 (簡易的に滑らせる)
    let collided = false;
    for (let obs of state.obstacles) {
        if (circleRectCollide(nx, ny, ENTITY_RADIUS, obs.x, obs.y, obs.w, obs.h)) {
            collided = true;
            // 簡単な回避: 角度をずらす
            e.tx = e.x + Math.cos(angle + Math.PI/2) * 50;
            e.ty = e.y + Math.sin(angle + Math.PI/2) * 50;
            break;
        }
    }
    
    if (!collided) {
        e.x = nx; e.y = ny;
    }
}

// --- 描画処理 ---
function draw() {
    ctx.clearRect(0, 0, MAP_SIZE, MAP_SIZE);

    if (!state) return;

    // グリッド（背景）
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    for(let i=0; i<MAP_SIZE; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
    }

    // 安全エリア
    if (state.mission.active) {
        ctx.beginPath();
        ctx.arc(state.mission.safeZone.x, state.mission.safeZone.y, state.mission.safeZone.r, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(76, 175, 80, 0.2)';
        ctx.fill();
        ctx.strokeStyle = state.mission.phase === 2 ? '#f44336' : '#4CAF50'; // 分断中は赤枠
        ctx.lineWidth = 5;
        ctx.stroke();
    }

    // 障害物
    ctx.fillStyle = '#999';
    state.obstacles.forEach(obs => {
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    });

    // 鬼BOX
    if (state.box.active) {
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.strokeRect(state.box.x, state.box.y, state.box.w, state.box.h);
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(state.box.x, state.box.y, state.box.w, state.box.h);
        ctx.fillStyle = '#000';
        ctx.font = '30px sans-serif';
        ctx.fillText(Math.ceil(state.box.timer), state.box.x + state.box.w/2 - 15, state.box.y + state.box.h/2 + 10);
    }

    // アイテム
    ctx.fillStyle = '#ffeb3b';
    state.items.forEach(item => {
        ctx.beginPath(); ctx.arc(item.x, item.y, ITEM_RADIUS, 0, Math.PI*2); ctx.fill();
        ctx.stroke();
    });

    // 冷凍銃
    ctx.fillStyle = '#00bcd4';
    state.freezeGuns.forEach(gun => {
        ctx.fillRect(gun.x - 10, gun.y - 10, 20, 20);
    });

    // 逃げ
    state.runners.forEach(r => {
        if (r.dead) return;
        ctx.fillStyle = r.hasItem ? '#ffeb3b' : '#2196F3';
        ctx.beginPath(); ctx.arc(r.x, r.y, ENTITY_RADIUS, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = r.inSafeZone ? '#4CAF50' : '#000';
        ctx.lineWidth = 2;
        ctx.stroke();
    });

    // 鬼
    state.hunters.forEach(h => {
        ctx.fillStyle = h.frozen ? '#00bcd4' : '#f44336';
        ctx.beginPath(); ctx.arc(h.x, h.y, ENTITY_RADIUS, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = h.isMission ? '#ffeb3b' : '#000'; // ミッション鬼は黄色枠
        ctx.lineWidth = 2;
        ctx.stroke();
    });
}

// --- UI更新 ---
function updateUI() {
    if (!state) return;
    
    let timeEl = document.getElementById('status-time');
    if (state.isRunning) {
        let m = Math.floor(state.timeLeft / 60);
        let s = Math.floor(state.timeLeft % 60);
        timeEl.innerText = `残り時間: ${m}:${s.toString().padStart(2, '0')}`;
        
        if (state.mission.active) {
            timeEl.innerText += `\n[ミッション: ${Math.ceil(state.mission.timer)}秒]`;
        }
    } else {
        timeEl.innerText = `終了！ ${state.gameResult}`;
    }

    let alive = state.runners.filter(r => !r.dead).length;
    document.getElementById('status-runners').innerText = `生存者: ${alive} / ${state.runners.length}`;
}

// --- 起動 ---
if (loadState()) {
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('control-panel').style.display = 'block';
}
requestAnimationFrame(update);

</script>
</body>
</html>
